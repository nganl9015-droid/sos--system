<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống SOS - GPS Chuẩn</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --blue: #2563eb; --red: #ef4444; --green: #22c55e; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { padding: 25px; border-radius: 20px; text-align: center; color: white; font-weight: 800; font-size: 26px; margin-bottom: 25px; }
        .safe-bg { background: var(--green); }
        .danger-bg { background: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        #map { height: 400px; border-radius: 15px; border: 2px solid #e2e8f0; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-reset { background: #334155; margin-top: 15px; }
        .btn-reset:hover { background: #1e293b; }
        #audio-init { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; text-align: center; }
        #logs { background: #1e293b; color: #fbbf24; padding: 15px; height: 180px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 12px; }
    </style>
</head>
<body>

<div id="audio-init">
    <div class="card" style="color: #0f172a; max-width: 400px;">
        <i class="fas fa-shield-alt" style="font-size: 60px; color: var(--blue);"></i>
        <h2>HỆ THỐNG GIÁM SÁT</h2>
        <p>Vui lòng nhấn nút bên dưới để cấp quyền âm thanh và bắt đầu theo dõi.</p>
        <button class="btn" style="background: var(--blue);" onclick="enableAudio()">KÍCH HOẠT HỆ THỐNG</button>
    </div>
</div>

<audio id="alarm-sound" loop preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg" type="audio/ogg">
</audio>

<div id="login-page" class="card" style="max-width: 450px; margin: 80px auto;">
    <h2 style="text-align:center; color: var(--blue);">Đăng Nhập Quản Lý</h2>
    <input type="text" id="user_id" style="width:100%; padding:15px; margin:10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;" placeholder="ID Xe (Ví dụ: xe01)">
    <input type="password" id="user_pass" style="width:100%; padding:15px; margin:10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;" placeholder="Mật khẩu">
    <button class="btn" style="background: var(--blue);" onclick="handleAuth()">XÁC THỰC</button>
</div>

<div id="dash" style="display:none; max-width: 1200px; margin: 0 auto;">
    <div id="st-header" class="header safe-bg">
        <span id="st-text">HỆ THỐNG: SẴN SÀNG</span>
    </div>

    <div style="display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px;">
        <div>
            <div class="card">
                <h3><i class="fas fa-map-marked-alt"></i> Vị Trí Hiện Tại</h3>
                <div id="map"></div>
                <p style="margin-top: 15px; font-weight: bold;">Tọa độ: <span id="coord" style="color: var(--blue);">Chưa có dữ liệu</span></p>
            </div>
        </div>
        <div>
            <div class="card">
                <h3><i class="fas fa-user-shield"></i> Trung Tâm Điều Khiển</h3>
                <button class="btn btn-reset" onclick="sendReset()">GỬI LỆNH RESET (AN TOÀN)</button>
                <p style="font-size: 12px; color: #64748b; margin-top: 10px;">* Nhấn Reset để tắt báo động trên cả thiết bị và ứng dụng.</p>
            </div>
            <div class="card">
                <h3><i class="fas fa-list-alt"></i> Nhật ký vận hành</h3>
                <div id="logs"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyChyZAmeBu2WLwsEzVrWFULbTYpl-nG0fE",
        authDomain: "hethongsos.firebaseapp.com",
        databaseURL: "https://hethongsos-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hethongsos",
        storageBucket: "hethongsos.appspot.com",
        messagingSenderId: "922952133122",
        appId: "1:922952133122:web:8da5b17a64aa7c7954551b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let mqtt, map, marker, current_id = "";
    const audio = document.getElementById('alarm-sound');

    function enableAudio() {
        document.getElementById('audio-init').style.display = 'none';
        audio.play().then(() => { audio.pause(); }).catch(e => {});
        addLog("Âm thanh đã được kích hoạt.");
    }

    function handleAuth() {
        const id = document.getElementById('user_id').value.trim().toLowerCase();
        const pass = document.getElementById('user_pass').value.trim();
        db.ref('users/' + id).once('value').then(s => {
            const val = s.val();
            if(val && val.password === pass) {
                current_id = id;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                initDash();
            } else { alert("Thông tin đăng nhập không chính xác!"); }
        });
    }

    function initDash() {
        map = L.map('map').setView([21.0285, 105.8542], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([21.0285, 105.8542]).addTo(map);
        connectMQTT();
    }

    function connectMQTT() {
        mqtt = new Paho.MQTT.Client("broker.hivemq.com", 8884, "sos_" + Math.random().toString(16).substr(2, 5));
        mqtt.onMessageArrived = (msg) => {
            const p = msg.payloadString;
            if(p.startsWith("danger")) {
                const d = p.split('|');
                updateWebState(true, d[1], d[2]);
            } else if(p === "safe") {
                updateWebState(false);
            }
        };
        mqtt.connect({ onSuccess: () => { 
            mqtt.subscribe("sos_system/"+current_id+"/data");
            addLog("Kết nối Broker thành công.");
        }, useSSL: true });
    }

    function updateWebState(isDanger, lat, lng) {
        const header = document.getElementById('st-header');
        const text = document.getElementById('st-text');
        if(isDanger) {
            header.className = "header danger-bg";
            text.innerHTML = '<i class="fas fa-biohazard"></i> CẢNH BÁO TAI NẠN';
            audio.play();
            if(lat && lng) {
                const lt = parseFloat(lat); const lg = parseFloat(lng);
                map.setView([lt, lg], 17);
                marker.setLatLng([lt, lg]);
                document.getElementById('coord').innerText = lt.toFixed(6) + ", " + lg.toFixed(6);
            }
        } else {
            header.className = "header safe-bg";
            text.innerHTML = '<i class="fas fa-check-circle"></i> HỆ THỐNG: AN TOÀN';
            audio.pause();
            audio.currentTime = 0;
        }
    }

    function sendReset() {
        const msg = new Paho.MQTT.Message("reset_system");
        msg.destinationName = "sos_system/" + current_id + "/lenh";
        mqtt.send(msg);
        updateWebState(false);
        addLog("Đã gửi lệnh Reset.");
    }

    function addLog(m) {
        const l = document.getElementById('logs');
        l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }
</script>
</body>
</html>
