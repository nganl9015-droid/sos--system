<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Giám Sát SOS Chuẩn Xác</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e293b; color: white; margin: 0; padding: 20px; text-align: center; }
        #map { height: 450px; width: 100%; border-radius: 15px; margin-top: 20px; border: 3px solid #ef4444; }
        .control-panel { background: white; color: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn-safe { background: #22c55e; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: bold; }
        .danger-text { color: #ef4444; font-weight: 800; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="control-panel">
        <h1 id="status-title">TRẠNG THÁI: <span style="color:#22c55e">AN TOÀN</span></h1>
        <button class="btn-safe" onclick="resetSOS()">XÁC NHẬN AN TOÀN (DỪNG CÒI)</button>
    </div>

    <div id="map"></div>
    <p id="coord-info">Tọa độ: Đang chờ dữ liệu...</p>

    <script>
        const BROKER = "broker.hivemq.com";
        const TOPIC_DATA = "sos_duong_duy_nhat/data";
        const TOPIC_CMD = "sos_duong_duy_nhat/lenh";
        
        let map = L.map('map').setView([21.0285, 105.8542], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([21.0285, 105.8542]).addTo(map);

        let client = new Paho.MQTT.Client(BROKER, Number(8884), "web_" + Math.random());
        client.connect({ useSSL: true, onSuccess: () => client.subscribe(TOPIC_DATA) });

        client.onMessageArrived = (msg) => {
            const data = msg.payloadString;
            if (data.startsWith("danger")) {
                const parts = data.split('|');
                const lat = parseFloat(parts[1]);
                const lng = parseFloat(parts[2]);

                document.getElementById('status-title').innerHTML = '<span class="danger-text">!!! PHÁT HIỆN TAI NẠN !!!</span>';
                document.getElementById('coord-info').innerText = "Vị trí: " + lat + ", " + lng;
                
                // Cập nhật bản đồ chuẩn xác
                map.setView([lat, lng], 18);
                marker.setLatLng([lat, lng]).bindPopup("<b>VỊ TRÍ TAI NẠN!</b>").openPopup();
            }
        };

        function resetSOS() {
            const message = new Paho.MQTT.Message("reset_system");
            message.destinationName = TOPIC_CMD;
            client.send(message);
            
            document.getElementById('status-title').innerHTML = 'TRẠNG THÁI: <span style="color:#22c55e">AN TOÀN</span>';
            alert("Đã gửi lệnh dừng báo động!");
        }
    </script>
</body>
</html>
