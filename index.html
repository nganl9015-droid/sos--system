<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống SOS - Offline Database</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #1e40af; --danger: #dc2626; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); margin: 0; overflow-x: hidden; }
        
        /* Giao diện Auth */
        .auth-page { height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        .hidden { display: none !important; }

        /* Dashboard */
        #dash { display: none; padding: 15px; background: var(--bg); min-height: 100vh; }
        .nav { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Input & Button */
        .inp { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-blue { background: var(--primary); }
        .btn-red { background: var(--danger); }
        .btn-outline { background: none; border: 1px solid var(--primary); color: var(--primary); margin-top: 10px; }

        /* Status Header */
        .status-bar { padding: 15px; border-radius: 12px; text-align: center; color: white; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        .safe { background: #16a34a; }
        .danger { background: var(--danger); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .card { background: white; padding: 18px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #map-frame { width: 100%; height: 280px; border-radius: 12px; border: 1px solid #e2e8f0; }
        h3 { margin: 0 0 15px 0; font-size: 16px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="login-page" class="auth-page">
        <div class="auth-box">
            <h2 style="color: var(--primary); margin-bottom: 5px;">HỆ THỐNG SOS</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Vui lòng đăng nhập</p>
            <input type="text" id="l-id" class="inp" placeholder="ID Xe">
            <input type="password" id="l-pass" class="inp" placeholder="Mật khẩu">
            <button class="btn btn-blue" onclick="doLogin()">ĐĂNG NHẬP</button>
            <button class="btn btn-outline" onclick="showPage('reg-page')">Tạo tài khoản mới</button>
        </div>
    </div>

    <div id="reg-page" class="auth-page hidden">
        <div class="auth-box">
            <h2 style="color: var(--primary);">Đăng ký thiết bị</h2>
            <input type="text" id="r-id" class="inp" placeholder="ID Xe (VD: xe01)">
            <input type="text" id="r-phone" class="inp" placeholder="Số điện thoại cứu hộ">
            <input type="password" id="r-pass" class="inp" placeholder="Mật khẩu">
            <button class="btn btn-blue" onclick="doRegister()">HOÀN TẤT ĐĂNG KÝ</button>
            <button class="btn btn-outline" onclick="showPage('login-page')">Quay lại đăng nhập</button>
        </div>
    </div>

    <div id="dash">
        <div class="nav">
            <span style="font-weight: bold; color: var(--primary)"><i class="fas fa-car"></i> <span id="display-id">--</span></span>
            <button onclick="doLogout()" style="border:none; background:none; color:var(--danger); font-size: 18px;"><i class="fas fa-power-off"></i></button>
        </div>

        <div id="st-bar" class="status-bar safe">HỆ THỐNG: AN TOÀN</div>

        <div class="card">
            <h3><i class="fas fa-phone-alt"></i> Cài đặt cứu hộ</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="phone-val" class="inp" style="margin:0; padding: 10px;">
                <button class="btn btn-blue" style="width: 80px; margin:0;" onclick="updatePhone()">LƯU</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-map-marker-alt" style="color: var(--danger)"></i> Vị trí xe</h3>
            <div id="map-frame"></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-list-ul"></i> Nhật ký hoạt động</h3>
            <div id="logs" style="height: 120px; overflow-y: auto; background: #f8fafc; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #475569;">
                [Hệ thống] Đang chờ dữ liệu...
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let map, marker, mqttClient;

        // Chuyển trang
        function showPage(pageId) {
            document.querySelectorAll('.auth-page, #dash').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = (pageId === 'dash') ? 'block' : 'flex';
        }

        // ĐĂNG KÝ (Lưu vào LocalStorage)
        function doRegister() {
            const id = document.getElementById('r-id').value.trim();
            const phone = document.getElementById('r-phone').value.trim();
            const pass = document.getElementById('r-pass').value.trim();

            if(!id || !phone || !pass) return alert("Vui lòng điền đủ thông tin!");

            let users = JSON.parse(localStorage.getItem('sos_users') || "{}");
            if(users[id]) return alert("ID xe này đã tồn tại!");

            users[id] = { password: pass, phone: phone };
            localStorage.setItem('sos_users', JSON.stringify(users));
            alert("Đăng ký thành công!");
            showPage('login-page');
        }

        // ĐĂNG NHẬP
        function doLogin() {
            const id = document.getElementById('l-id').value.trim();
            const pass = document.getElementById('l-pass').value.trim();
            
            let users = JSON.parse(localStorage.getItem('sos_users') || "{}");
            
            if(users[id] && users[id].password === pass) {
                currentUser = id;
                document.getElementById('display-id').innerText = id;
                document.getElementById('phone-val').value = users[id].phone;
                showPage('dash');
                initApp();
            } else {
                alert("Sai ID hoặc mật khẩu!");
            }
        }

        // CẬP NHẬT SĐT
        function updatePhone() {
            const newPhone = document.getElementById('phone-val').value.trim();
            let users = JSON.parse(localStorage.getItem('sos_users') || "{}");
            users[currentUser].phone = newPhone;
            localStorage.setItem('sos_users', JSON.stringify(users));
            alert("Đã cập nhật số điện thoại cứu hộ!");
        }

        // ĐĂNG XUẤT
        function doLogout() {
            if(mqttClient) mqttClient.disconnect();
            location.reload();
        }

        // KHỞI TẠO APP (MAP & MQTT)
        function initApp() {
            if(!map) {
                map = L.map('map-frame').setView([21.0357, 105.8012], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([21.0357, 105.8012]).addTo(map);
            }
            connectMQTT();
        }

        function connectMQTT() {
            const cid = "client_" + Math.random().toString(16).substr(2, 5);
            mqttClient = new Paho.MQTT.Client("broker.hivemq.com", 8000, cid);
            
            mqttClient.onMessageArrived = (msg) => {
                const data = msg.payloadString.split('|');
                if(data[0] === "danger") {
                    const lat = parseFloat(data[1]), lng = parseFloat(data[2]);
                    updateStatus(true);
                    marker.setLatLng([lat, lng]);
                    map.setView([lat, lng], 17);
                    addLog("CẢNH BÁO: Phát hiện va chạm!");
                } else {
                    updateStatus(false);
                }
            };

            mqttClient.connect({onSuccess: () => {
                addLog("Máy chủ: Đã kết nối.");
                mqttClient.subscribe("hethong_sos/data");
            }});
        }

        function updateStatus(isDanger) {
            const bar = document.getElementById('st-bar');
            if(isDanger) {
                bar.innerText = "!!! CẢNH BÁO: XE GẶP SỰ CỐ !!!";
                bar.className = "status-bar danger";
            } else {
                bar.innerText = "HỆ THỐNG: AN TOÀN";
                bar.className = "status-bar safe";
            }
        }

        function addLog(msg) {
            const logBox = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML = `[${time}] ${msg}<br>` + logBox.innerHTML;
        }
    </script>
</body>
</html>
